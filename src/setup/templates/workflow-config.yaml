tracker:
  kind: feishu_bitable
  app_token: "{{ app_token }}"
  table_id: "{{ table_id }}"
  state_field: "状态"
  identifier_field: "编号"
  title_field: "标题"
  description_field: "描述"
  priority_field: "优先级"
  labels_field: "标签"
  tokens_field: "tokens消耗"
  progress_field: "进度"
  result_summary_field: "结果摘要"
  join_command_field: "操作命令"
  active_states:
    - "待处理"
    - "进行中"
  terminal_states:
    - "已完成"
    - "已取消"
    - "已关闭"

polling:
  interval_ms: 30000

workspace:
{{ workspace }}

agent:
  kind: claude-code
  max_concurrent_agents: 5
  max_turns: 20
  max_retry_backoff_ms: 300000
  max_retry_attempts: 3
  in_progress_state: "进行中"
  permanent_failure_state: "永久失败"
  active_reset_state: "待处理"
  config:
    command: claude
    timeout_ms: 3600000
    approval_policy: "{{ approval_policy }}"